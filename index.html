<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORAL TWIN — 산호초 디지털 트윈 프로토타입 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#050912; --deep:#0b1330; --panel:#0e1b2e;
    --coral-healthy:#ff5d4c; --coral-bleach:#e8e4d8; --bio-teal:#2de6c8;
    --text-hi:#eef3f7; --text-lo:#8ea2b8; --line:rgba(255,255,255,0.08);
    --warn:#ffb46b; --good:#6ee7b7; --bad:#ff6b6b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; height:100%; background:var(--void); overflow:hidden; font-family:'Inter',sans-serif; color:var(--text-hi);}
  #canvas-root{position:fixed; inset:0;} canvas{display:block;}

  #intro-copy{position:fixed; top:8vh; left:50%; transform:translateX(-50%); text-align:center; z-index:20; pointer-events:none; transition:opacity .5s;}
  #intro-copy h1{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(28px,4vw,46px); letter-spacing:.02em;
    background:linear-gradient(90deg,#fff,var(--bio-teal)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  #intro-copy p{margin-top:10px; color:var(--text-lo); font-size:14px; letter-spacing:.08em; text-transform:uppercase;}
  #intro-hint{position:fixed; bottom:6vh; left:50%; transform:translateX(-50%); font-size:13px; color:var(--text-lo);
    letter-spacing:.05em; z-index:20; display:flex; align-items:center; gap:8px; transition:opacity .5s;}
  .pulse-dot{width:8px; height:8px; border-radius:50%; background:var(--coral-healthy); animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,93,76,.6);}70%{box-shadow:0 0 0 10px rgba(255,93,76,0);}100%{box-shadow:0 0 0 0 rgba(255,93,76,0);}}
  #marker-tooltip{position:fixed; z-index:25; pointer-events:none; display:none; background:var(--panel); border:1px solid var(--line);
    border-radius:6px; padding:8px 12px; font-size:12px; font-family:'JetBrains Mono',monospace; white-space:nowrap;}
  #transition-veil{position:fixed; inset:0; background:#eaf7f4; opacity:0; pointer-events:none; z-index:40; transition:opacity .5s ease;}

  #twin-ui{position:fixed; inset:0; z-index:15; pointer-events:none; opacity:0; transition:opacity .8s ease;}
  #twin-ui.active{opacity:1;}
  .panel{pointer-events:auto; background:rgba(14,27,46,0.8); backdrop-filter:blur(10px); border:1px solid var(--line); border-radius:12px;}
  .panel h3{font-family:'Space Grotesk',sans-serif; font-size:12px; letter-spacing:.05em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:6px;}

  #topbar{position:absolute; top:16px; left:16px; right:16px; display:flex; gap:18px; align-items:center; padding:10px 18px;}
  #topbar .loc{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; flex:0 0 auto;}
  #topbar .loc span{display:block; font-family:'Inter',sans-serif; font-weight:400; font-size:11px; color:var(--text-lo); text-transform:uppercase; letter-spacing:.06em; margin-top:2px;}
  #back-btn{margin-left:auto; background:none; border:1px solid var(--line); color:var(--text-lo); border-radius:8px; padding:8px 14px; font-size:12px; cursor:pointer; flex:0 0 auto;}
  #back-btn:hover{color:var(--text-hi); border-color:var(--bio-teal);}

  /* 상시 표시되는 미니 HUD (패널을 열지 않아도 핵심 지표는 항상 보임) */
  #hud-mini{display:flex; gap:14px; align-items:center; flex-wrap:wrap;}
  #hud-mini .hud-item{display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-lo); white-space:nowrap;}
  #hud-mini .hud-item b{color:var(--text-hi); font-family:'JetBrains Mono',monospace; font-weight:500;}
  .hud-dot{width:7px; height:7px; border-radius:50%; display:inline-block; flex:0 0 auto;}

  /* 패널을 열고 닫는 독(dock) 버튼 — 화면 과밀 방지: 기본적으로 모든 상세 패널은 숨김 */
  #dock{display:flex; gap:6px; flex:0 0 auto;}
  .dock-btn{width:38px; height:38px; border-radius:9px; border:1px solid var(--line); background:rgba(255,255,255,.04);
    color:var(--text-lo); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.2s;}
  .dock-btn:hover{border-color:var(--bio-teal); color:var(--text-hi);}
  .dock-btn.active{border-color:var(--bio-teal); background:rgba(45,230,200,.16); color:var(--bio-teal);}

  .float-panel{transition:opacity .25s ease, transform .25s ease;}
  .float-panel.hidden{opacity:0; pointer-events:none; transform:translateY(10px);}

  #left-col{position:absolute; top:66px; left:16px; width:270px; bottom:150px; display:flex; flex-direction:column; gap:10px;}
  #site-profile{padding:13px 16px; font-size:11px; color:var(--text-lo); line-height:1.6; font-family:'JetBrains Mono',monospace; flex:0 0 auto;}
  #site-profile b{color:var(--bio-teal);}
  #site-profile .tag{display:inline-block; margin-top:6px; padding:2px 7px; border-radius:4px; background:rgba(45,230,200,.12); color:var(--bio-teal); font-size:10px;}

  #sim-panel{padding:14px 16px; overflow-y:auto; flex:1; min-height:0;}
  .slider-row{margin-bottom:12px;}
  .slider-row label{display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-lo); margin-bottom:5px;}
  .slider-row label b{color:var(--text-hi); font-family:'JetBrains Mono',monospace; font-weight:500;}
  input[type=range]{width:100%; accent-color:var(--bio-teal); height:4px;}
  input[type=range]:disabled{opacity:.4;}
  #metrics{margin-top:4px; padding-top:12px; border-top:1px solid var(--line);}
  .metric-row{margin-bottom:10px;}
  .metric-row label{font-size:11.5px; color:var(--text-lo); display:flex; justify-content:space-between; margin-bottom:5px;}
  .bar-bg{width:100%; height:7px; background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden;}
  .bar-fill{height:100%; width:50%; transition:width .6s ease, background .6s ease;}
  #cover-fill{background:linear-gradient(90deg,var(--bio-teal),var(--good));}
  #risk-fill{background:linear-gradient(90deg,var(--good),var(--warn),var(--bad));}
  #sensor-badge{font-size:10px; color:var(--text-lo); font-family:'JetBrains Mono',monospace; margin-top:2px;}

  #action-row{display:flex; gap:8px; flex:0 0 auto;}
  .action-btn{flex:1; background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--text-hi); border-radius:8px;
    padding:9px 10px; font-size:11px; text-align:center; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; transition:.2s;}
  .action-btn:hover{background:rgba(45,230,200,.1); border-color:var(--bio-teal);}
  .action-btn .ico{font-size:16px;}

  #right-col{position:absolute; top:66px; right:16px; width:280px; bottom:150px; display:flex; flex-direction:column; gap:10px;}
  #species-panel{padding:14px 16px; flex:0 0 32%; overflow-y:auto;}
  .species-item{display:flex; align-items:center; gap:8px; padding:6px 4px; border-bottom:1px dashed var(--line); font-size:12px; cursor:pointer; border-radius:6px; transition:background .15s;}
  .species-item:hover{background:rgba(45,230,200,.08);}
  .species-item:active{background:rgba(45,230,200,.18);}
  .species-item.pool{opacity:.65;}
  .species-item.pool .name small{color:var(--text-lo);}
  .species-item:last-child{border-bottom:none;}
  .species-item .emoji{font-size:16px;}
  .species-item .name{flex:1;}
  .species-item .name small{display:block; color:var(--text-lo); font-size:10px; font-style:italic;}
  .species-item .tag{font-size:9px; padding:2px 6px; border-radius:4px; white-space:nowrap;}
  .tag-confirmed{background:rgba(45,230,200,.12); color:var(--bio-teal);}
  .tag-ai{background:rgba(255,180,107,.15); color:var(--warn);}
  .tag-pool{background:rgba(255,255,255,.08); color:var(--text-lo);}

  #ai-panel{padding:14px 16px; flex:1; min-height:0; display:flex; flex-direction:column;}
  #ai-log{flex:1; overflow-y:auto; margin-bottom:10px;}
  .ai-msg{color:var(--text-lo); font-size:11.5px; line-height:1.55; margin-bottom:9px; padding-bottom:9px; border-bottom:1px dashed var(--line);}
  .ai-msg:last-child{border-bottom:none;}
  .ai-msg b{color:var(--text-hi);}
  #idea-input{width:100%; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:8px; color:var(--text-hi);
    font-size:11.5px; padding:8px 10px; resize:none; font-family:'Inter',sans-serif; margin-bottom:6px;}
  #idea-row{display:flex; gap:6px;}
  #idea-row button{flex:1; font-size:11px; padding:8px; border-radius:8px; border:1px solid var(--line); background:rgba(45,230,200,.1); color:var(--bio-teal); cursor:pointer;}
  #idea-row button.secondary{background:rgba(255,255,255,.04); color:var(--text-lo);}
  #idea-row button:hover{border-color:var(--bio-teal);}

  #timesim-bar{position:absolute; bottom:16px; left:16px; right:16px; padding:12px 18px;}
  #timesim-top{display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  #timesim-top span.lbl{font-size:11px; color:var(--text-lo); margin-right:2px;}
  .dur-btn{background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--text-lo); border-radius:6px;
    padding:6px 12px; font-size:11px; cursor:pointer;}
  .dur-btn.active{background:rgba(45,230,200,.15); color:var(--bio-teal); border-color:var(--bio-teal);}
  #play-btn{margin-left:auto; background:var(--bio-teal); color:#04211c; border:none; border-radius:6px; padding:7px 16px; font-size:12px; font-weight:600; cursor:pointer;}
  #play-btn.playing{background:var(--bad); color:#2a0808;}
  #sim-clock{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-lo); margin-left:6px;}
  #sim-chart{width:100%; height:60px; display:block;}
  #chart-legend{display:flex; gap:16px; font-size:10px; color:var(--text-lo); margin-top:4px;}
  #chart-legend span{display:flex; align-items:center; gap:5px;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}

  #bt-modal{position:fixed; inset:0; z-index:60; background:rgba(3,6,12,.75); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center;}
  #bt-modal .box{width:300px; padding:28px 24px; text-align:center; border-radius:16px; background:var(--panel); border:1px solid var(--line);}
  #bt-icon{font-size:40px; margin-bottom:14px; display:inline-block;}
  #bt-icon.connecting{animation:spin 1.4s linear infinite;}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  #bt-status{font-size:13px; color:var(--text-lo); margin-top:6px; line-height:1.5;}
  #bt-close{margin-top:18px; background:none; border:1px solid var(--line); color:var(--text-lo); border-radius:8px; padding:8px 20px; font-size:12px; cursor:pointer;}

  ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
</style>
</head>
<body>

<div id="canvas-root"></div>
<div id="intro-copy"><h1>CORAL TWIN</h1><p>산호초 디지털 트윈 · 프로토타입 v2</p></div>
<div id="intro-hint"><span class="pulse-dot"></span>붉은 마커를 클릭해 산호 서식지로 이동하세요</div>
<div id="marker-tooltip"></div>
<div id="transition-veil"></div>

<div id="twin-ui">
  <div id="topbar" class="panel">
    <div class="loc" id="loc-name">— <span id="loc-sub">좌표 대기 중</span></div>
    <div id="hud-mini">
      <span class="hud-item"><i class="hud-dot" style="background:var(--bio-teal)"></i>피복률 <b id="hud-cover">–</b></span>
      <span class="hud-item"><i class="hud-dot" style="background:var(--warn)"></i>백화위험 <b id="hud-risk">–</b></span>
      <span class="hud-item" id="hud-sensor">🔌 미연결</span>
    </div>
    <div id="dock">
      <button class="dock-btn" data-panel="env" title="환경 시뮬레이션">🌡️</button>
      <button class="dock-btn" data-panel="eco" title="종 라이브러리 · AI">🐟</button>
      <button class="dock-btn" data-panel="time" title="시간 시뮬레이션">⏱️</button>
      <button class="dock-btn" id="dock-sensor-btn" title="센서로봇 연결">🔵</button>
    </div>
    <button id="back-btn">← 지구로 돌아가기</button>
  </div>

  <div id="left-col" class="float-panel hidden">
    <div id="site-profile" class="panel"></div>

    <div id="sim-panel" class="panel">
      <h3>🌡️ 환경 시뮬레이션 파라미터</h3>
      <div class="slider-row"><label>해수 온도 <b id="v-temp">27.0°C</b></label><input type="range" id="s-temp" min="24" max="34" step="0.1" value="27"></div>
      <div class="slider-row"><label>이산화탄소 농도 <b id="v-co2">420 ppm</b></label><input type="range" id="s-co2" min="380" max="900" step="5" value="420"></div>
      <div class="slider-row"><label>해수 pH <b id="v-ph">8.10</b></label><input type="range" id="s-ph" min="7.60" max="8.30" step="0.01" value="8.10"></div>
      <div class="slider-row"><label>광량 <b id="v-light">80%</b></label><input type="range" id="s-light" min="0" max="100" step="1" value="80"></div>
      <div class="slider-row"><label>염분 <b id="v-sal">35.0 ppt</b></label><input type="range" id="s-sal" min="28" max="42" step="0.5" value="35"></div>
      <div class="slider-row"><label>해류 속도 <b id="v-cur">0.40 m/s</b></label><input type="range" id="s-cur" min="0" max="2" step="0.05" value="0.4"></div>
      <div class="slider-row"><label>구름량(탁도) <b id="v-cloud">20%</b></label><input type="range" id="s-cloud" min="0" max="100" step="1" value="20"></div>
      <div class="slider-row"><label>영양염 부하 지수 <b id="v-nut">15</b></label><input type="range" id="s-nut" min="0" max="100" step="1" value="15"></div>

      <div id="metrics">
        <div class="metric-row"><label>산호 피복률 <b id="v-cover">85%</b></label><div class="bar-bg"><div class="bar-fill" id="cover-fill"></div></div></div>
        <div class="metric-row"><label>백화 위험도 <b id="v-risk">18%</b></label><div class="bar-bg"><div class="bar-fill" id="risk-fill"></div></div></div>
        <div id="sensor-badge">🔌 센서 미연결 — 수동 입력값 기준</div>
      </div>
    </div>

    <div id="action-row">
      <button class="action-btn" id="btn-connect-sensor"><span class="ico">🔵</span>센서로봇 연결</button>
    </div>
  </div>

  <div id="right-col" class="float-panel hidden">
    <div id="species-panel" class="panel">
      <h3>📖 종 라이브러리 <span style="font-weight:400; text-transform:none; color:var(--text-lo); font-size:10px;">— 종을 클릭하면 화면에 등장</span></h3>
      <div id="species-list"></div>
    </div>

    <div id="ai-panel" class="panel">
      <h3>🧠 AI 복원 연구보조원</h3>
      <div id="ai-log"></div>
      <textarea id="idea-input" rows="2" placeholder="복원 아이디어 입력 (예: 차광막 설치, 내열성 산호 이식, 영양염 저감...)"></textarea>
      <div id="idea-row">
        <button id="btn-idea-apply">시뮬레이션에 적용</button>
        <button id="btn-ai-interpret" class="secondary">현재 상태 해석</button>
      </div>
    </div>
  </div>

  <div id="timesim-bar" class="panel float-panel hidden">
    <div id="timesim-top">
      <span class="lbl">시뮬레이션 기간</span>
      <button class="dur-btn" data-dur="1">1일</button>
      <button class="dur-btn active" data-dur="30">1개월</button>
      <button class="dur-btn" data-dur="365">1년</button>
      <button class="dur-btn" data-dur="7300">20년</button>
      <span id="sim-clock">경과: 0일</span>
      <button id="play-btn">▶ 재생</button>
    </div>
    <canvas id="sim-chart" width="1400" height="60"></canvas>
    <div id="chart-legend">
      <span><i class="dot" style="background:#2de6c8"></i>산호 피복률</span>
      <span><i class="dot" style="background:#ffb46b"></i>백화 위험도</span>
      <span><i class="dot" style="background:#6ee7b7"></i>수온(스케일)</span>
    </div>
  </div>
</div>

<div id="bt-modal">
  <div class="box">
    <span id="bt-icon">📡</span>
    <div id="bt-title" style="font-family:'Space Grotesk',sans-serif; font-size:14px;">센서로봇 페어링</div>
    <div id="bt-status">블루투스 장치 검색 중...</div>
    <button id="bt-close">닫기</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
/* =========================================================
   CORAL TWIN v2
   ========================================================= */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-root').appendChild(renderer.domElement);
const clock = new THREE.Clock();
let mode = 'space';

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0,0,14);
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ================= SPACE SCENE ================= */
const spaceScene = new THREE.Scene();
function makeStars(n){
  const geo=new THREE.BufferGeometry(); const pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){ const r=300+Math.random()*400, th=Math.random()*Math.PI*2, ph=Math.acos(Math.random()*2-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph); }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  return new THREE.Points(geo, new THREE.PointsMaterial({color:0xffffff,size:1.1,sizeAttenuation:true}));
}
spaceScene.add(makeStars(3000));
spaceScene.add(new THREE.AmbientLight(0x445577,0.6));
const sun = new THREE.DirectionalLight(0xffffff,1.4); sun.position.set(30,10,20); spaceScene.add(sun);

function makeEarthTexture(){
  const c=document.createElement('canvas'); c.width=1024; c.height=512; const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,512); g.addColorStop(0,'#0a3d62'); g.addColorStop(1,'#0a2a4a');
  ctx.fillStyle=g; ctx.fillRect(0,0,1024,512); ctx.fillStyle='#1f7a4d';
  for(let i=0;i<26;i++){ const x=Math.random()*1024,y=100+Math.random()*300;
    ctx.beginPath(); ctx.ellipse(x,y,30+Math.random()*70,18+Math.random()*40,Math.random()*Math.PI,0,Math.PI*2); ctx.fill(); }
  return new THREE.CanvasTexture(c);
}
// 절차적 대체용 지구(모델 로드를 실패했을 때만 씬에 추가됨)
const earthFallback = new THREE.Mesh(new THREE.SphereGeometry(5,64,64), new THREE.MeshStandardMaterial({map:makeEarthTexture(), roughness:.85}));
spaceScene.add(new THREE.Mesh(new THREE.SphereGeometry(5.18,64,64), new THREE.MeshBasicMaterial({color:0x4fd6ff,transparent:true,opacity:.12,side:THREE.BackSide})));

function latLonToVec3(lat,lon,r){
  const phi=(90-lat)*(Math.PI/180), theta=(lon+180+EARTH_LON_OFFSET_DEG)*(Math.PI/180);
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
// 첨부된 지구 모델이 실제 대륙/바다 텍스처 없이 단색으로 만들어져 있어(Tinkercad 단색 모델),
// 위경도 기준 회전 정렬을 코드만으로 100% 보장할 수 없음. 브라우저에서 마커 위치를 눈으로 확인 후

const gltfLoader = new THREE.GLTFLoader();
// 업로드 실수(폴더 구조가 다르거나 대소문자가 다른 경우)에 대비해 여러 경로 후보를 순서대로 시도한다.
function loadModelWithFallback(paths, onSuccess, onFail){
  let i = 0;
  function tryNext(){
    if(i>=paths.length){ onFail(); return; }
    const p = paths[i++];
    try{
      gltfLoader.load(p, onSuccess, undefined, ()=> tryNext());
    }catch(e){ tryNext(); }
  }
  tryNext();
}
// Tinkercad로 내보낸 GLB는 정점 컬러(COLOR_0)가 모두 (0,0,0)으로 찍혀 있어
// three.js가 이를 그대로 곱해 모델이 새까맣게 렌더링되는 문제가 있다. 로드 시 항상 제거해야 한다.
// 반대로 실제 이미지 텍스처(baseColorTexture)가 있는 모델(예: Meshy AI로 만든 산호)은 텍스처를 살려야
// 훨씬 사실적으로 보이므로, 텍스처가 있으면 material은 그대로 두고 정점 컬러만 제거한다.
function sanitizeImportedModel(root, fallbackColor){
  root.traverse(child=>{
    if(child.isMesh){
      if(child.geometry.attributes.color) child.geometry.deleteAttribute('color');
      if(!child.geometry.attributes.normal) child.geometry.computeVertexNormals();
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      const hasTexture = mats.some(m=> m && m.map);
      if(!hasTexture){
        child.material = new THREE.MeshStandardMaterial({ color: fallbackColor, roughness:.7, metalness:.05 });
      } else {
        mats.forEach(m=>{ m.side = THREE.DoubleSide; }); // 얇은 산호 지오메트리 뒷면도 보이도록
      }
      child.castShadow = false; child.receiveShadow = false;
    }
  });
  return root;
}
// 원점이 중앙이 아니거나 스케일이 제각각인 업로드 모델을 공통 기준(반지름 targetRadius)으로 정규화
function normalizeToRadius(object3d, targetRadius){
  const box = new THREE.Box3().setFromObject(object3d);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  object3d.position.sub(center);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  object3d.scale.setScalar((targetRadius*2)/maxDim);
}

function buildMarkers(){
  markerGroup.clear(); markers = [];
  if(!earthObj) return;
  REEF_SITES.forEach(site=>{
    const dir = latLonToVec3(site.lat, site.lon, 1).normalize();
    let point = dir.clone().multiplyScalar(5.05);
    const rc = new THREE.Raycaster(dir.clone().multiplyScalar(200), dir.clone().negate());
    const hits = rc.intersectObject(earthObj, true);
    if(hits.length) point = hits[0].point.clone().addScaledVector(dir, 0.03);
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.09,16,16), new THREE.MeshBasicMaterial({color:0xff4433}));
    dot.position.copy(point);
    const ring = new THREE.Mesh(new THREE.RingGeometry(0.13,0.19,24), new THREE.MeshBasicMaterial({color:0xff4433,side:THREE.DoubleSide,transparent:true,opacity:.7}));
    ring.position.copy(point); ring.lookAt(point.clone().multiplyScalar(2));
    dot.userData = site;
    markerGroup.add(dot, ring); markers.push(dot);
  });
}

  camera.position.lerp(dir.clone().multiplyScalar(THREE.MathUtils.lerp(14,5.6,Math.min(transitionT,1))), 0.06);

  if(transitionT>=1.2){ veil.style.opacity=0; enterOcean(transitionTarget); }
}

let coralMeshes = []; // {mesh, baseColor, resilience}

function branchCoral(origin, dir, depth, len, baseColor, resilience){
  if(depth<=0) return;
  const segs=6; const points=[origin.clone()]; let cur=origin.clone(); let d=dir.clone();
  for(let i=0;i<segs;i++){
    d.x+=(Math.random()-.5)*0.5; d.y+=Math.random()*0.35; d.z+=(Math.random()-.5)*0.5; d.normalize();
    cur = cur.clone().add(d.clone().multiplyScalar(len/segs)); points.push(cur.clone());
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const mat = new THREE.MeshStandardMaterial({color:baseColor.clone(), roughness:.6});
  const tube = new THREE.Mesh(new THREE.TubeGeometry(curve,10,0.05*depth,6,false), mat);
  coralGroup.add(tube);
  coralMeshes.push({mesh:tube, baseColor:baseColor.clone(), resilience});
  const branches = 1+Math.floor(Math.random()*2);
  for(let b=0;b<branches;b++){
    const nd = d.clone().add(new THREE.Vector3((Math.random()-.5),Math.random()*.6,(Math.random()-.5))).normalize();
    branchCoral(cur, nd, depth-1, len*0.7, baseColor, resilience);
  }
}

    [[-0.09,0,0.16],[0.09,0,0.16]].forEach(p=>{ const claw=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.1),mat); claw.position.set(p[0],p[1],p[2]); g.add(claw); });
  } else if(kind==='lionfish'){
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8), mat); g.add(body);
    for(let i=0;i<8;i++){
      const spike = new THREE.Mesh(new THREE.ConeGeometry(0.012,0.26,4), mat);
      const ang = (i/8)*Math.PI*2;
      spike.position.set(Math.cos(ang)*0.13, Math.sin(ang)*0.13*0.5, 0.04);
      spike.rotation.z = ang - Math.PI/2;
      g.add(spike);
    }
  } else if(kind==='clownfish'){
    const body = new THREE.Mesh(new THREE.ConeGeometry(0.12,0.4,8), mat); body.rotation.z=Math.PI/2; g.add(body);
    const stripe = new THREE.Mesh(new THREE.TorusGeometry(0.085,0.018,6,12), new THREE.MeshStandardMaterial({color:0xffffff}));
    stripe.rotation.y=Math.PI/2; g.add(stripe);
  } else {
    const body = new THREE.Mesh(new THREE.ConeGeometry(0.15,0.5,8), mat); body.rotation.z=Math.PI/2; g.add(body);
  }
  return g;
}
function spawnCreature(species){
  const g = createCreatureMesh(species.kind||'fish', species.color!==undefined?species.color:0xffd23f);
  g.position.set((Math.random()-.5)*16, Math.random()*6-2, (Math.random()-.5)*16);
  g.userData = { speed:.4+Math.random()*.6, dir:new THREE.Vector3((Math.random()-.5),(Math.random()-.5)*.3,(Math.random()-.5)).normalize(),
    turnClock:Math.random()*5, label:species.name||'' };
  fishGroup.add(g);
  return g;
}

/* ================= AI 복원 아이디어 → 3D 개입 장치 시각화 =================
   "차광막 설치" 같은 텍스트만으로 끝내지 않고, 실제로 화면(시뮬레이션 씬) 안에
   장치를 등장시켜 배치 애니메이션(축소→확대)으로 보여준다. 정밀한 로봇 모델은 아니고
   개념을 전달하는 저폴리 프록시이지만, "그냥 문장으로만 알려주는 것"보다 훨씬 체감이 크다. */
const interventionGroup = new THREE.Group(); oceanScene.add(interventionGroup);
function pickCoralSpot(){
  if(coralPositions.length) return coralPositions[Math.floor(Math.random()*coralPositions.length)].clone();
  return new THREE.Vector3((Math.random()-.5)*10, -3.6, (Math.random()-.5)*10);
}
function deploy(group, pos){
  group.position.copy(pos);
  group.scale.set(0.001,0.001,0.001);
  group.userData.deployT = 0;
  interventionGroup.add(group);
  return group;
}
// 차광막 로봇: 산호 하나를 덮는 캐노피 + 모듈형임을 보여주는 가장자리 부표 모듈
function spawnShadeDevice(){
  const g = new THREE.Group();
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,1.1,6), new THREE.MeshStandardMaterial({color:0x3a4a55}));
  arm.position.y = 0.55; g.add(arm);
  const canopy = new THREE.Mesh(new THREE.CircleGeometry(0.85,20), new THREE.MeshStandardMaterial({color:0x152029, side:THREE.DoubleSide, transparent:true, opacity:.82, roughness:.4}));
  canopy.rotation.x = -Math.PI/2; canopy.position.y = 1.05; g.add(canopy);
  for(let i=0;i<6;i++){ const ang=(i/6)*Math.PI*2;
    const mod = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.07,0.1), new THREE.MeshStandardMaterial({color:0xffb46b}));
    mod.position.set(Math.cos(ang)*0.8, 1.05, Math.sin(ang)*0.8); g.add(mod); }
  g.userData = { kind:'shade', bob:Math.random()*10 };
  return deploy(g, pickCoralSpot());
}
// 내열 산호 이식 마커: 이식된 신규 개체 표시(은은하게 빛나는 구슬 군집)
function spawnTransplantMarker(){
  const g = new THREE.Group();
  for(let i=0;i<3;i++){
    const s = new THREE.Mesh(new THREE.SphereGeometry(0.08,10,10), new THREE.MeshStandardMaterial({color:0x9dff7c, emissive:0x225522, emissiveIntensity:.6}));
    s.position.set((Math.random()-.5)*0.4, -3.4+Math.random()*0.15, (Math.random()-.5)*0.4);
    g.add(s);
  }
  g.userData = { kind:'transplant', bob:Math.random()*10 };
  return deploy(g, pickCoralSpot());
}
// 영양염 정화 장치: 필터 박스 + 기포 파티클
function spawnFilterDevice(){
  const g = new THREE.Group();
  const box = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.35,0.35), new THREE.MeshStandardMaterial({color:0x3a4a55}));
  box.position.y=0.2; g.add(box);
  const bubbleGeo = new THREE.BufferGeometry(); const n=40; const pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){ pos[i*3]=(Math.random()-.5)*0.3; pos[i*3+1]=Math.random()*1.6; pos[i*3+2]=(Math.random()-.5)*0.3; }
  bubbleGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const bubbles = new THREE.Points(bubbleGeo, new THREE.PointsMaterial({color:0xdfffff,size:.045,transparent:true,opacity:.7}));
  g.add(bubbles);
  g.userData = { kind:'filter', bob:Math.random()*10, bubbles };
  return deploy(g, pickCoralSpot());
}
// 해류 순환 강화 장치: 회전하는 소형 터빈
function spawnTurbineDevice(){
  const g = new THREE.Group();
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.13,0.3,8), new THREE.MeshStandardMaterial({color:0x3a4a55})); base.position.y=0.15; g.add(base);
  const hub = new THREE.Group(); hub.position.y=0.35;
  for(let i=0;i<3;i++){ const blade=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.03,0.07), new THREE.MeshStandardMaterial({color:0x9fd8ff}));
    blade.position.x=0.16; blade.rotation.y=(i/3)*Math.PI*2; hub.add(blade); }
  g.add(hub);
  g.userData = { kind:'turbine', bob:Math.random()*10, hub };
  return deploy(g, pickCoralSpot());
}
function updateInterventions(dt){
  interventionGroup.children.forEach(g=>{
    if(g.userData.deployT<1){ g.userData.deployT=Math.min(1, g.userData.deployT+dt*1.1); const s=THREE.MathUtils.smoothstep? THREE.MathUtils.smoothstep(g.userData.deployT,0,1) : g.userData.deployT; g.scale.setScalar(Math.max(0.001,s)); }
    g.userData.bob += dt;
    if(g.userData.kind==='shade' || g.userData.kind==='filter') g.position.y += Math.sin(g.userData.bob*1.5)*0.0006;
    if(g.userData.kind==='turbine' && g.userData.hub) g.userData.hub.rotation.y += dt*4;
    if(g.userData.kind==='filter' && g.userData.bubbles) g.userData.bubbles.rotation.y += dt*0.3;
  });
}

/* ================= 환경 시뮬레이션(8변수) ================= */
const sliders = {
  temp:{el:document.getElementById('s-temp'), out:document.getElementById('v-temp'), fmt:v=>v.toFixed(1)+'°C'},
  co2:{el:document.getElementById('s-co2'), out:document.getElementById('v-co2'), fmt:v=>Math.round(v)+' ppm'},
  ph:{el:document.getElementById('s-ph'), out:document.getElementById('v-ph'), fmt:v=>v.toFixed(2)},
  light:{el:document.getElementById('s-light'), out:document.getElementById('v-light'), fmt:v=>Math.round(v)+'%'},
  sal:{el:document.getElementById('s-sal'), out:document.getElementById('v-sal'), fmt:v=>v.toFixed(1)+' ppt'},
  cur:{el:document.getElementById('s-cur'), out:document.getElementById('v-cur'), fmt:v=>v.toFixed(2)+' m/s'},
  cloud:{el:document.getElementById('s-cloud'), out:document.getElementById('v-cloud'), fmt:v=>Math.round(v)+'%'},
  nut:{el:document.getElementById('s-nut'), out:document.getElementById('v-nut'), fmt:v=>Math.round(v)},
};
let connectedSensor=false, sensorInterval=null;
let simState={cover:80,risk:20,history:[]}, simDays=0, simPlaying=false, simDurationDays=30;

function readVals(){
  const v={}; for(const k in sliders) v[k]=parseFloat(sliders[k].el.value); return v;
}
function computeRisk(v){
  const site = currentSite || {bleachOffset:0};
  const bleachTemp = 27 + site.bleachOffset;
  let tempStress = v.temp>bleachTemp ? Math.min(100, Math.pow(v.temp-bleachTemp,2.1)*3.0) : Math.max(0,(bleachTemp-v.temp)*0.6);
  tempStress *= (1 - Math.min(v.cur,1.5)/1.5*0.25); // 해류가 빠를수록 열 스트레스 일부 완화
  const phStress = Math.abs(v.ph-8.10)*140;
  let lightStress = 0;
  if(v.light<40) lightStress=(40-v.light)*1.2; else if(v.light>95) lightStress=(v.light-95)*2;
  const salStress = Math.abs(v.sal-35)*6;
  const nutStress = v.nut*0.5;
  const cloudStress = v.cloud>60 ? (v.cloud-60)*0.6 : 0;
  const co2Stress = Math.max(0,(v.co2-420))*0.05;
  const raw = tempStress*0.38 + phStress*0.18 + lightStress*0.12 + salStress*0.08 + nutStress*0.14 + cloudStress*0.05 + co2Stress*0.05;
  return Math.max(2, Math.min(98, raw));
}

function applySimulation(){
  const v = readVals();
  for(const k in sliders) sliders[k].out.textContent = sliders[k].fmt(v[k]);

  const risk = computeRisk(v);
  simState.risk += (risk - simState.risk)*0.25; // 즉각 반응 + 약간의 관성
  const equilibriumCover = Math.max(4, Math.min(95, (currentSite?currentSite.coverBase:80) - simState.risk*0.55));
  simState.cover += (equilibriumCover - simState.cover)*0.15;

  document.getElementById('v-cover').textContent = Math.round(simState.cover)+'%';
  document.getElementById('v-risk').textContent = Math.round(simState.risk)+'%';
  document.getElementById('cover-fill').style.width = simState.cover+'%';
  document.getElementById('risk-fill').style.width = simState.risk+'%';
  document.getElementById('risk-fill').style.background = simState.risk>60 ? 'var(--bad)' : simState.risk>35 ? 'var(--warn)' : 'var(--good)';
  document.getElementById('hud-cover').textContent = Math.round(simState.cover)+'%';
  document.getElementById('hud-risk').textContent = Math.round(simState.risk)+'%';

  // 개체별 백화: resilience가 낮을수록(취약) 같은 스트레스에도 더 빨리, 더 뚜렷하게(완전 흰색) 하얗게 변함
  const WHITE = new THREE.Color(0xffffff);
  coralMeshes.forEach(c=>{
    const effectiveStress = simState.risk / c.resilience;
    const bleach = Math.max(0, Math.min(1, (effectiveStress-10)/45));
    c.mesh.material.color.copy(c.baseColor).lerp(WHITE, bleach);
    c.mesh.material.emissive.setScalar(bleach*0.12); // 완전 백화 시 은은한 발광으로 눈에 띄게
  });
  // 실물 산호 3D 모델(hero)도 전체 위험도 기준으로 함께 백화
  if(coralHeroMat){
    const heroBleach = Math.max(0, Math.min(1, (simState.risk-10)/45));
    coralHeroMat.color.copy(coralHeroBaseColor).lerp(WHITE, heroBleach);
    coralHeroMat.emissive.setScalar(heroBleach*0.12);
  }
  fishGroup.children.forEach(f=> f.userData.speed = 0.3 + v.cur*0.5);
}
Object.values(sliders).forEach(s=> s.el.addEventListener('input', applySimulation));

const btModal=document.getElementById('bt-modal'), btIcon=document.getElementById('bt-icon'), btStatus=document.getElementById('bt-status');
function openSensorConnectModal(){
  btModal.style.display='flex'; btIcon.textContent='📡'; btIcon.classList.add('connecting');
  btStatus.textContent='블루투스 장치 검색 중...';
  if(connectedSensor){ btIcon.classList.remove('connecting'); btIcon.textContent='🔗'; btStatus.textContent='이미 연결되어 있습니다 — JellyBot-01 판독값 자동 반영 중 (모의)'; return; }
  setTimeout(()=>{ btStatus.textContent='해파리형 센서로봇(JellyBot-01) 발견됨'; },1200);
  setTimeout(()=>{ btStatus.textContent='페어링 중...'; },2200);
  setTimeout(()=>{
    btIcon.classList.remove('connecting'); btIcon.textContent='🔗';
    btStatus.textContent='모의 연결 완료 — 이후 온도/해류/염분/탁도 값이 센서 판독값으로 자동 갱신됩니다.';
    onSensorConnected();
  },3400);
}
document.getElementById('btn-connect-sensor').addEventListener('click', openSensorConnectModal);
document.getElementById('dock-sensor-btn').addEventListener('click', openSensorConnectModal);
document.getElementById('bt-close').addEventListener('click', ()=> btModal.style.display='none');

function onSensorConnected(){
  connectedSensor = true;
  ['temp','cur','sal','cloud'].forEach(k=> sliders[k].el.disabled=true);
  document.getElementById('sensor-badge').textContent = '🔌 센서 연결됨 — JellyBot-01 판독값 자동 반영 중 (모의)';
  document.getElementById('hud-sensor').textContent = '🔗 JellyBot-01 연결됨';
  logAI('센서로봇', 'JellyBot-01 모의 연결 완료. 이후 수온·해류·염분·탁도는 센서 판독값(시뮬레이션)으로 자동 조정됩니다.');

  const pool = currentSite.speciesPool.filter(p=> !siteDynamicSpecies.some(s=>s.latin===p.latin));
  if(pool.length){
    const pick = pool[Math.floor(Math.random()*pool.length)];
    siteDynamicSpecies.push({...pick, tag:'ai'});
    renderSpeciesList();
    logAI('AI 자동 분류', '센서 영상 데이터에서 개체를 감지해 '+pick.name+'('+pick.latin+')(으)로 자동 분류, 종 라이브러리에 추가했습니다.');
    spawnCreature(pick);
  }
  if(sensorInterval) clearInterval(sensorInterval);
  sensorInterval = setInterval(()=>{
    if(!connectedSensor) return;
    sliders.temp.el.value = Math.max(24, Math.min(34, parseFloat(sliders.temp.el.value) + (Math.random()-0.5)*0.3)).toFixed(1);
    sliders.cur.el.value = Math.max(0, Math.min(2, parseFloat(sliders.cur.el.value) + (Math.random()-0.5)*0.1)).toFixed(2);
    sliders.sal.el.value = Math.max(28, Math.min(42, parseFloat(sliders.sal.el.value) + (Math.random()-0.5)*0.3)).toFixed(1);
    applySimulation();
  }, 3500);
}

/* ================= 시간 시뮬레이션(플레이) ================= */
document.querySelectorAll('.dur-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.dur-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); simDurationDays = parseFloat(btn.dataset.dur);
  });
});
const playBtn = document.getElementById('play-btn');
playBtn.addEventListener('click', ()=>{
  simPlaying = !simPlaying;
  playBtn.textContent = simPlaying ? '⏸ 정지' : '▶ 재생';
  playBtn.classList.toggle('playing', simPlaying);
  if(simPlaying){ simDays=0; simState.history=[]; }
});

function tickTimeSimulation(dtReal){
  if(!simPlaying) return;
  const daysPerSecond = simDurationDays/6; // 선택 기간을 약 6초 동안 재생
  simDays += daysPerSecond*dtReal;

  // 시나리오 트렌드: 계절 진동 + 완만한 온난화 + 약한 무작위성 (실측 예측 아님, 학습용 시나리오)
  const years = simDays/365;
  const seasonal = Math.sin(2*Math.PI*simDays/365)*1.1;
  const warming = years*0.35; // 단순화된 장기 온난화 시나리오 계수
  const noise = (Math.random()-0.5)*0.25;
  if(!connectedSensor){
    sliders.temp.el.value = Math.max(24, Math.min(34, 27 + seasonal + warming + noise)).toFixed(1);
  }
  const co2v = Math.max(380, Math.min(900, 420 + years*2.4));
  sliders.co2.el.value = co2v.toFixed(0);
  // 해양 산성화 근사 상관관계: CO2 상승 → pH 하강
  sliders.ph.el.value = Math.max(7.6, Math.min(8.3, 8.10 - (co2v-420)*0.00035)).toFixed(2);

  applySimulation();

  simState.history.push({day:simDays, cover:simState.cover, risk:simState.risk, temp:parseFloat(sliders.temp.el.value)});
  if(simState.history.length>240) simState.history.shift();
  drawChart();

  const label = simDays<60 ? Math.round(simDays)+'일' : simDays<730 ? (simDays/30).toFixed(1)+'개월' : (simDays/365).toFixed(1)+'년';
  document.getElementById('sim-clock').textContent = '경과: '+label;

  if(simDays>=simDurationDays){
    simPlaying=false; playBtn.textContent='▶ 재생'; playBtn.classList.remove('playing');
    logAI('시뮬레이션 완료', simDurationDays+'일 시나리오 재생 완료. 최종 피복률 '+Math.round(simState.cover)+'%, 백화 위험도 '+Math.round(simState.risk)+'%.');
  }
}
function drawChart(){
  const cv = document.getElementById('sim-chart'); const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const h = simState.history; if(h.length<2) return;
  const W=cv.width, H=cv.height;
  function line(getter, color, scale, offset){
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2;
    h.forEach((p,i)=>{
      const x = i/(h.length-1)*W;
      const y = H - ((getter(p)+offset)*scale/100)*H;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  line(p=>p.cover,'#2de6c8',100,0);
  line(p=>p.risk,'#ffb46b',100,0);
  line(p=>((p.temp-24)/10*100),'#6ee7b7',100,0);
}

/* ================= 메인 루프 ================= */
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if(mode==='space'){ controls.update(); renderer.render(spaceScene, camera); }
  else if(mode==='transition'){ updateTransition(dt); renderer.render(spaceScene, camera); }
  else if(mode==='ocean'){
    if(oceanControls) oceanControls.update();
    plankton.rotation.y += dt*0.02;
    tickTimeSimulation(dt);
    updateInterventions(dt);
    fishGroup.children.forEach(f=>{
      f.userData.turnClock -= dt;
      if(f.userData.turnClock<=0){
        f.userData.dir.add(new THREE.Vector3((Math.random()-.5),(Math.random()-.5)*.2,(Math.random()-.5))).normalize();
        f.userData.turnClock=2+Math.random()*4;
      }
      f.position.addScaledVector(f.userData.dir, f.userData.speed*dt);
      f.position.x=THREE.MathUtils.clamp(f.position.x,-16,16);
      f.position.z=THREE.MathUtils.clamp(f.position.z,-16,16);
      f.position.y=THREE.MathUtils.clamp(f.position.y,-3,6);
      f.lookAt(f.position.clone().add(f.userData.dir)); f.rotateX(Math.PI/2);
    });
    renderer.render(oceanScene, camera);
  }
}
animate();
</script>
